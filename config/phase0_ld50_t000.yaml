chunking:
  n_windows: 3
  window_size: 1024
constraints:
  pass_content_type_tags_to_model: false
  phase_mechanics_isolated: true
generation:
  do_sample: false
  max_new_tokens: 200
  seed: 42
  temperature: 0.0
mechanics:
  cannibalism_enabled: false
  hgt_enabled: false
  reproduction_enabled: false
