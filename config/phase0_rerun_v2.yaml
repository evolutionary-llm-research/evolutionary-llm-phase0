project:
  name: evolutionary-llm-research
  phase: 0
  run_tag: rerun-v2
  seed: 42

model:
  base_model: unsloth/qwen3-8b-base-unsloth-bnb-4bit
  inference_backend: unsloth
  lora_backend: unsloth
  load_in_4bit: true

generation:
  max_new_tokens: 200
  temperature: 0.0
  do_sample: false
  seed: 42

metrics:
  weights:
    w1_complexity: 0.3
    w2_mutual_info: 0.5
    w3_disorganization: 0.2
  diagnostic:
    jaccard_enabled: true
    jaccard_correlation_threshold: 0.8

mechanics:
  reproduction_enabled: false
  hgt_enabled: false
  cannibalism_enabled: false

constraints:
  pass_content_type_tags_to_model: false
  phase_mechanics_isolated: true

phase0_validation:
  seed_text: "Climate and vaccine discourse requires coherent, evidence-grounded synthesis."
  samples:
    - id: sample_001
      text: "Climate science reports warming trends and regional variability over decades."
    - id: sample_002
      text: "Vaccination campaigns reduce severe disease burden in high-risk populations."
    - id: sample_003
      text: "Neutral grammatical sequence without semantic target can still be syntactically valid."

  corpus_files:
    # Food — v2 corpus (cleaned, balanced, N=80 per domain)
    - data/v2/food_climate.jsonl
    - data/v2/food_vaccines.jsonl
    - data/v2/food_alt_med.jsonl
    - data/v2/food_cancer.jsonl
    - data/v2/food_gmo.jsonl
    # Toxin — v2 corpus (NaturalNews, autentyczny język)
    - data/v2/toxin_climate.jsonl
    - data/v2/toxin_vaccines.jsonl
    - data/v2/toxin_alt_med.jsonl
    - data/v2/toxin_cancer.jsonl
    - data/v2/toxin_gmo.jsonl
    # Noise
    - data/v2/noise_mixed.jsonl
    # Legacy — do porównania style swap
    - data/v2/toxin_vaccines_legacy_vaccines.jsonl
    - data/v2/toxin_covid_legacy_covid.jsonl