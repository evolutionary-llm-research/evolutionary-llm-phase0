project:
  name: evolutionary-llm-research
  phase: 0
  run_tag: mini_rerun_v3_toxin
  seed: 42

model:
  base_model: unsloth/qwen3-8b-base-unsloth-bnb-4bit
  inference_backend: unsloth
  lora_backend: unsloth
  load_in_4bit: true

generation:
  max_new_tokens: 200
  temperature: 0.0
  do_sample: false
  seed: 42

chunking:
  n_windows: 3
  window_size: 1024

metrics:
  weights:
    w1_complexity: 0.3
    w2_mutual_info: 0.5
    w3_disorganization: 0.2
  diagnostic:
    jaccard_enabled: true
    jaccard_correlation_threshold: 0.8

mechanics:
  reproduction_enabled: false
  hgt_enabled: false
  cannibalism_enabled: false

constraints:
  pass_content_type_tags_to_model: false
  phase_mechanics_isolated: true

phase0_validation:
  seed_text: "Climate and vaccine discourse requires coherent, evidence-grounded synthesis."
  n_windows: 3
  window_size: 1024
  save_chunk_texts: true
  corpus_files:
    - data/v2_mini_v3/food_climate.jsonl
    - data/v2_mini_v3/food_vaccines.jsonl
    - data/v2_mini_v3/food_alt_med.jsonl
    - data/v2_mini_v3/food_cancer.jsonl
    - data/v2_mini_v3/food_gmo.jsonl
    - data/v2_mini_v3/toxin_climate.jsonl
    - data/v2_mini_v3/toxin_vaccines.jsonl
    - data/v2_mini_v3/toxin_alt_med.jsonl
    - data/v2_mini_v3/toxin_cancer.jsonl
    - data/v2_mini_v3/toxin_gmo.jsonl
    - data/v2_mini_v3/noise_wikipedia.jsonl
